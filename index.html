<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>QF Pack Verify</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  --text: #f0f2f8; --muted: #7a7f9a;
  --accent: #4f8ef7; --green: #2ecc8a; --red: #f04f4f; --amber: #f5a623;
  --green-bg: rgba(46,204,138,0.12); --red-bg: rgba(240,79,79,0.12); --amber-bg: rgba(245,166,35,0.12);
  --mono: 'IBM Plex Mono', monospace; --sans: 'DM Sans', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

#app { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

/* TOPBAR */
.topbar { padding: 52px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.topbar-row { display: flex; justify-content: space-between; align-items: center; }
.order-id { font-family: var(--mono); font-size: 12px; color: var(--accent); }
.order-customer { font-size: 17px; font-weight: 600; color: var(--text); margin-top: 2px; }
.badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.05em; text-transform: uppercase; background: var(--amber-bg); color: var(--amber); }
.progress-track { height: 2px; background: var(--border); border-radius: 2px; margin-top: 12px; }
.progress-fill { height: 2px; background: var(--green); border-radius: 2px; transition: width 0.5s ease; }
.progress-label { font-size: 11px; color: var(--muted); margin-top: 5px; font-family: var(--mono); }

/* LINES */
.lines-scroll { flex: 1; overflow-y: auto; padding: 14px 16px 0; -webkit-overflow-scrolling: touch; }
.line-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 10px; position: relative; overflow: hidden; transition: border-color 0.25s, opacity 0.25s; }
.line-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--border2); transition: background 0.25s; }
.line-card.active { border-color: var(--accent); }
.line-card.active::before { background: var(--accent); }
.line-card.confirmed { opacity: 0.55; }
.line-card.confirmed::before { background: var(--green); }
.line-card.overridden::before { background: var(--amber); }
.line-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.line-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
.line-vendor { font-size: 11px; color: var(--muted); margin-top: 2px; }
.line-lot-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.lot-pill { font-family: var(--mono); font-size: 12px; color: var(--accent); background: rgba(79,142,247,0.1); padding: 4px 10px; border-radius: 6px; }
.lot-pill.amber { color: var(--amber); background: var(--amber-bg); }
.qty-label { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.line-status { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 11px; color: var(--muted); }
.sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.s-pending { background: var(--border2); }
.s-active { background: var(--accent); }
.s-done { background: var(--green); }
.s-amber { background: var(--amber); }

/* CAMERA PANEL */
#camera-panel {
  flex-shrink: 0;
  padding: 12px 16px 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.current-bar {
  background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.25);
  border-radius: 10px; padding: 9px 14px;
}
.current-label { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.current-name { font-size: 13px; color: var(--text); font-weight: 500; margin-top: 1px; }
.current-lot-hint { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 1px; }

/* Camera viewfinder */
#viewfinder-wrap {
  position: relative; border-radius: 14px; overflow: hidden;
  background: #000; border: 1px solid var(--border2);
  aspect-ratio: 4/3;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
#canvas { display: none; }

/* Capture button */
.capture-row { display: flex; gap: 10px; align-items: center; }
#capture-btn {
  flex: 1; height: 56px; border-radius: 14px; background: var(--accent);
  border: none; color: #fff; font-size: 16px; font-weight: 600; font-family: var(--sans);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.15s, transform 0.1s;
}
#capture-btn:active { transform: scale(0.96); background: #3a7ae8; }
#capture-btn:disabled { background: var(--surface2); color: var(--muted); }

#manual-btn {
  width: 56px; height: 56px; border-radius: 14px; background: var(--surface2);
  border: 1px solid var(--border2); color: var(--muted); font-size: 22px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
#manual-btn:active { opacity: 0.7; }

/* Thinking overlay */
#thinking {
  position: absolute; inset: 0; background: rgba(15,17,23,0.75);
  display: none; align-items: center; justify-content: center; flex-direction: column; gap: 10px;
  border-radius: 14px;
}
#thinking.visible { display: flex; }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.thinking-txt { font-size: 13px; color: var(--muted); }

/* FEEDBACK */
.feedback-area { padding: 8px 16px 16px; flex-shrink: 0; min-height: 52px; }
.feedback { border-radius: 12px; padding: 11px 14px; font-size: 13px; font-weight: 500; line-height: 1.5; display: none; animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.feedback.ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(46,204,138,0.2); display: block; }
.feedback.fail { background: var(--red-bg); color: #ff7a7a; border: 1px solid rgba(240,79,79,0.2); display: block; }
.feedback.warn { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); display: block; }
.override-btns { display: flex; gap: 8px; margin-top: 10px; }
.override-btns button { flex:1; padding:10px; border-radius:10px; font-size:12px; font-weight:600; border:none; cursor:pointer; font-family:var(--sans); }
.override-btns button:active { opacity:0.75; }
.btn-accept { background: var(--amber); color: #1a1200; }
.btn-reject { background: var(--surface2); color: var(--text); border: 1px solid var(--border2) !important; }

/* MANUAL INPUT MODAL */
#manual-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  align-items: flex-end; justify-content: center; z-index: 50;
}
#manual-modal.open { display: flex; }
.modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; }
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; }
.modal-row { display: flex; gap: 10px; }
.modal-input { flex:1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 14px 16px; font-family: var(--mono); font-size: 16px; color: var(--text); outline: none; -webkit-appearance: none; }
.modal-input:focus { border-color: var(--accent); }
.modal-confirm { width: 56px; height: 52px; border-radius: 12px; background: var(--accent); border: none; color: #fff; font-size: 22px; cursor: pointer; }

/* COMPLETE */
#complete { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; height: 100dvh; padding: 40px 24px; text-align: center; }
.complete-icon { font-size: 72px; margin-bottom: 16px; }
.complete-title { font-size: 26px; font-weight: 700; }
.complete-sub { font-size: 14px; color: var(--muted); margin-top: 8px; line-height: 1.6; }
.complete-stats { display: flex; gap: 16px; margin-top: 24px; }
.stat { background: var(--surface); border-radius: 12px; padding: 14px 20px; border: 1px solid var(--border); }
.stat-n { font-size: 28px; font-weight: 700; color: var(--green); font-family: var(--mono); }
.stat-l { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.reset-btn { margin-top: 28px; padding: 14px 32px; border-radius: 12px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); font-size: 14px; font-weight: 600; font-family: var(--sans); cursor: pointer; }

/* FLASH */
#flash { position: fixed; inset: 0; pointer-events: none; z-index: 99; opacity: 0; transition: opacity 0.15s; }
#flash.green { background: rgba(46,204,138,0.2); opacity: 1; }
#flash.red { background: rgba(240,79,79,0.2); opacity: 1; }
</style>
</head>
<body>
<div id="flash"></div>

<div id="app">
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="order-id">Far-M/OUT/132232</div>
        <div class="order-customer">Beach Grove Golf Club</div>
      </div>
      <span class="badge">Desk Test</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 / 3 lines confirmed</div>
  </div>

  <div class="lines-scroll" id="lines-scroll"></div>

  <div id="camera-panel">
    <div class="current-bar" id="current-bar">
      <div class="current-label">Scan now</div>
      <div class="current-name" id="cur-name">—</div>
      <div class="current-lot-hint" id="cur-lot">—</div>
    </div>

    <div id="viewfinder-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div id="thinking"><div class="spinner"></div><div class="thinking-txt">Reading label…</div></div>
    </div>

    <div class="capture-row">
      <button id="capture-btn" onclick="captureAndRead()">
        <span>📸</span><span>Read Lot</span>
      </button>
      <button id="manual-btn" onclick="openManual()" title="Type manually">⌨️</button>
    </div>
  </div>

  <div class="feedback-area">
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<div id="complete">
  <div class="complete-icon">✅</div>
  <div class="complete-title">Order verified</div>
  <div class="complete-sub">Far-M/OUT/132232<br>All lines confirmed</div>
  <div class="complete-stats">
    <div class="stat"><div class="stat-n">3</div><div class="stat-l">Lines</div></div>
    <div class="stat"><div class="stat-n">3</div><div class="stat-l">Units</div></div>
    <div class="stat" id="override-stat" style="display:none;"><div class="stat-n" style="color:var(--amber);" id="override-n">0</div><div class="stat-l">Overrides</div></div>
  </div>
  <button class="reset-btn" onclick="resetOrder()">Test again</button>
</div>

<div id="manual-modal">
  <div class="modal-sheet">
    <div class="modal-title">Enter lot manually</div>
    <div class="modal-row">
      <input class="modal-input" id="manual-input" type="text" placeholder="Lot number…" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" />
      <button class="modal-confirm" onclick="submitManual()">↵</button>
    </div>
  </div>
</div>

<script>
const LINES = [
  { sku:'050756', name:'White Truffle Honey 140 g', vendor:'Royal Command', lot:'AMTB240003', qty:1 },
  { sku:'150191', name:'Pistachio Fine Paste 130 g', vendor:'Almondena', lot:'33537', qty:1 },
  { sku:'182481', name:'Red Cornflower Dried 10 g', vendor:'Dinavedic', lot:'37016', qty:1 }
];
const VALID = {
  '050756': ['AMTB240003','AMTB240001','AMTB230015'],
  '150191': ['33537','33421','33108'],
  '182481': ['37016','36944']
};

let lines, pending, overrideCount, stream;

async function init() {
  if (!window.ANTHROPIC_KEY) {
    const stored = sessionStorage.getItem('qf_ak');
    if (stored) { window.ANTHROPIC_KEY = stored; }
    else {
      const key = prompt('Anthropic API key (sk-ant-...):\nThis is stored only in this browser session.');
      if (key && key.trim().startsWith('sk-')) {
        window.ANTHROPIC_KEY = key.trim();
        sessionStorage.setItem('qf_ak', key.trim());
      }
    }
  }
  lines = LINES.map(l => ({...l, confirmed:false, override:false}));
  pending = null; overrideCount = 0;
  document.getElementById('app').style.display = 'flex';
  document.getElementById('complete').style.display = 'none';
  hideFeedback();
  render();
  updateCurrentBar();
  await startCamera();
  speak('Order loaded. Point camera at lot label and tap Read Lot.');
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) {
    showFeedback('fail', '📷 Camera access denied. Use the ⌨️ button to enter lots manually.');
  }
}

function speak(txt) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.rate = 1.05;
  window.speechSynthesis.speak(u);
}

function flash(type) {
  const el = document.getElementById('flash');
  el.className = type;
  setTimeout(() => el.className = '', 350);
}

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

function hideFeedback() {
  const el = document.getElementById('feedback');
  el.className = 'feedback'; el.style.display = 'none';
}

function showFeedback(type, html, persist) {
  const el = document.getElementById('feedback');
  el.className = 'feedback ' + type;
  el.innerHTML = html; el.style.display = 'block';
  if (!persist) setTimeout(hideFeedback, 3000);
}

function activeIdx() { return lines.findIndex(l => !l.confirmed); }

function updateCurrentBar() {
  const ai = activeIdx();
  if (ai === -1) return;
  const l = lines[ai];
  document.getElementById('cur-name').textContent = l.name;
  document.getElementById('cur-lot').textContent = 'Expected lot: ' + l.lot;
}

function render() {
  const done = lines.filter(l => l.confirmed).length;
  document.getElementById('prog').style.width = Math.round(done/lines.length*100) + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + lines.length + ' lines confirmed';
  const ai = activeIdx();
  let html = '';
  lines.forEach((l, i) => {
    const isActive = i === ai;
    let cls = 'line-card' + (l.confirmed ? ' confirmed' + (l.override ? ' overridden' : '') : isActive ? ' active' : '');
    const dot = l.confirmed ? (l.override ? 's-amber' : 's-done') : isActive ? 's-active' : 's-pending';
    const status = l.confirmed ? (l.override ? 'Override — audit flagged' : 'Confirmed') : isActive ? 'Scan now' : 'Waiting';
    const check = l.confirmed ? (l.override ? '⚠️' : '✅') : '';
    const lotCls = 'lot-pill' + (l.override ? ' amber' : '');
    html += `<div class="${cls}">
      <div class="line-top">
        <div><div class="line-name">${l.name}</div><div class="line-vendor">${l.vendor} · SKU ${l.sku}</div></div>
        <div style="font-size:22px;">${check}</div>
      </div>
      <div class="line-lot-row">
        <span class="${lotCls}">${l.lot}</span>
        <span class="qty-label">qty ${l.qty}</span>
      </div>
      <div class="line-status"><div class="sdot ${dot}"></div><span>${status}</span></div>
    </div>`;
  });
  document.getElementById('lines-scroll').innerHTML = html;
  if (ai >= 0) {
    const card = document.getElementById('lines-scroll').children[ai];
    if (card) card.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

async function captureAndRead() {
  if (pending) { showFeedback('fail','Resolve the override first.', true); return; }
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (!video.srcObject) { openManual(); return; }

  const btn = document.getElementById('capture-btn');
  btn.disabled = true;
  document.getElementById('thinking').classList.add('visible');

  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 960;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];

  const ai = activeIdx();
  const line = lines[ai];
  const allLots = Object.values(VALID).flat().join(', ');

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
          'Content-Type': 'application/json',
          'x-api-key': window.ANTHROPIC_KEY || '',
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: `This is a product label photo. Extract ONLY the lot number. Known lots in our system: ${allLots}. \nReply with ONLY a JSON object: {"lot": "LOTVALUE"} or {"lot": null} if no lot found. No other text.` }
          ]
        }]
      })
    });

    const data = await resp.json();
    const raw = data.content?.[0]?.text?.trim() || '';
    let parsed;
    try { parsed = JSON.parse(raw); } catch(e) {
      const m = raw.match(/"lot"\s*:\s*"([^"]+)"/);
      parsed = { lot: m ? m[1] : null };
    }

    document.getElementById('thinking').classList.remove('visible');
    btn.disabled = false;

    if (!parsed.lot) {
      showFeedback('fail', '📷 Could not read a lot number. Reposition label and try again, or use ⌨️.');
      vibrate([80]);
      speak('Could not read lot. Try again.');
      return;
    }

    processLot(parsed.lot.toUpperCase().trim());

  } catch(e) {
    document.getElementById('thinking').classList.remove('visible');
    btn.disabled = false;
    showFeedback('fail', 'API error — use ⌨️ to enter manually.');
  }
}

function processLot(raw) {
  const ai = activeIdx();
  if (ai === -1) return;
  const line = lines[ai];

  if (raw === line.lot.toUpperCase()) {
    lines[ai].confirmed = true;
    flash('green'); vibrate([40]);
    const next = lines.find((l,i) => i > ai && !l.confirmed);
    if (next) {
      showFeedback('ok', '✅ ' + line.name + ' confirmed');
      speak('Confirmed. Next: ' + next.name);
    } else {
      hideFeedback();
      speak('Last line confirmed. Order complete.');
    }
    render(); updateCurrentBar(); checkComplete();
    return;
  }

  const validLots = (VALID[line.sku]||[]).map(l => l.toUpperCase());
  if (validLots.includes(raw)) {
    pending = { ai, scanned: raw, expected: line.lot };
    showFeedback('warn',
      '⚠️ Wrong lot — same product<br>' +
      '<span style="font-family:var(--mono);font-size:11px;">Expected: ' + line.lot + '&nbsp;&nbsp;Scanned: ' + raw + '</span>' +
      '<div class="override-btns">' +
        '<button class="btn-accept" onclick="acceptOverride()">Accept — log audit</button>' +
        '<button class="btn-reject" onclick="rejectOverride()">Reject — put back</button>' +
      '</div>', true
    );
    flash('red'); vibrate([30,50,30]);
    speak('Wrong lot. Accept override?');
    return;
  }

  const wrongLine = lines.find((l,i) => i !== ai && l.lot.toUpperCase() === raw);
  if (wrongLine) {
    showFeedback('fail', '❌ Lot ' + raw + ' belongs to <strong>' + wrongLine.name + '</strong> — wrong product.');
    flash('red'); vibrate([80]);
    speak('Wrong product. Put it back.');
    return;
  }

  showFeedback('fail', '❌ Lot <span style="font-family:var(--mono);">' + raw + '</span> not on this order.');
  flash('red'); vibrate([80]);
  speak('Not on this order.');
}

function acceptOverride() {
  if (!pending) return;
  lines[pending.ai].lot = pending.scanned;
  lines[pending.ai].confirmed = true;
  lines[pending.ai].override = true;
  overrideCount++;
  const next = lines.find((l,i) => i > pending.ai && !l.confirmed);
  pending = null;
  showFeedback('warn', '⚠️ Override accepted — FIFO audit flagged.');
  speak('Override accepted.' + (next ? ' Next: ' + next.name : ' Order complete.'));
  render(); updateCurrentBar(); checkComplete();
}

function rejectOverride() {
  if (!pending) return;
  const exp = pending.expected;
  pending = null;
  showFeedback('fail', '❌ Rejected. Find lot <span style="font-family:var(--mono);">' + exp + '</span>');
  speak('Rejected. Find lot ' + exp);
}

function checkComplete() {
  if (!lines.every(l => l.confirmed)) return;
  setTimeout(() => {
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('app').style.display = 'none';
    const c = document.getElementById('complete');
    c.style.display = 'flex';
    if (overrideCount > 0) {
      document.getElementById('override-stat').style.display = 'block';
      document.getElementById('override-n').textContent = overrideCount;
    }
    speak('Order complete. All lines verified.');
  }, 600);
}

function openManual() {
  document.getElementById('manual-modal').classList.add('open');
  setTimeout(() => document.getElementById('manual-input').focus(), 100);
}

function closeManual() { document.getElementById('manual-modal').classList.remove('open'); }

function submitManual() {
  const val = document.getElementById('manual-input').value.trim().toUpperCase();
  document.getElementById('manual-input').value = '';
  closeManual();
  if (val) processLot(val);
}

document.getElementById('manual-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); submitManual(); }
});

document.getElementById('manual-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('manual-modal')) closeManual();
});

function resetOrder() { init(); }

init();
</script>
</body>
</html>
